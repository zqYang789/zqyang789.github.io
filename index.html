        <style type="text/css">

			}
			.im_overlay {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;

			}
			.im_overlay img {
				position: absolute;
				top: 50%;
				left: 50%;
				-webkit-transform: translate(-50%, -50%);
				-moz-transform: translate(-50%, -50%);
				-o-transform: translate(-50%, -50%);
				transform: translate(-50%, -50%);
				max-width: 90%;
				max-height: 90%;
				width: auto;
				height: auto;
				border: 2px solid #fff;
				box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
			}
			.im_close {
				position: absolute;
				top: 20px;
				right: 30px;
				font-size: 50px;
				color: #fff;
				cursor: pointer;
				z-index: 10001;
			}
			.im_close:hover {
				color: #ccc;
			}

    <body>
		<audio src="wy.mp3"  hidden="true" autoplay="true" loop="true"></audio> 
		<div class="g"><img src="images/g.png"></div>
		<div class="jay"><img src="images/jay.png"></div>
		<div id="im_wrapper" class="im_wrapper">
			<div style="background-position:0px 0px;"><img src="images/1.jpg" alt="" /></div>
			<div style="background-position:-125px 0px;"><img src="images/2.jpg" alt="" /></div>
			<div style="background-position:-250px 0px;"><img src="images/3.jpg" alt="" /></div>
			<div style="background-position:-375px 0px;"><img src="images/4.jpg" alt="" /></div>
			<div style="background-position:-500px 0px;"><img src="images/5.jpg" alt="" /></div>

			<div style="background-position:0px -125px;"><img src="images/6.jpg" alt="" /></div>
			<div style="background-position:-125px -125px;"><img src="images/7.jpg" alt="" /></div>
			<div style="background-position:-250px -125px;"><img src="images/8.jpg" alt="" /></div>
			<div style="background-position:-375px -125px;"><img src="images/9.jpg" alt="" /></div>
			<div style="background-position:-500px -125px;"><img src="images/10.jpg" alt="" /></div>

			<div style="background-position:0px -250px;"><img src="images/11.jpg" alt="" /></div>
			<div style="background-position:-125px -250px;"><img src="images/12.jpg" alt="" /></div>
		</div>
		<div id="im_loading" class="im_loading"></div>
        <div>
		</div>

        <!-- The JavaScript -->
        <script type="text/javascript" src="js/jquery.min.js"></script>
		<script src="js/jquery.transform-0.9.1.min.js"></script>
		<script type="text/javascript">
			(function($,sr){

				var debounce = function (func, threshold, execAsap) {
					var timeout;
					return function debounced () {
						var obj = this, args = arguments;
						function delayed () {
							if (!execAsap)
								func.apply(obj, args);
							timeout = null;
						};
						if (timeout)
							clearTimeout(timeout);
						else if (execAsap)
							func.apply(obj, args);
						timeout = setTimeout(delayed, threshold || 100);
					};
				}
				//smartresize
				jQuery.fn[sr] = function(fn){  return fn ? this.bind('resize', debounce(fn)) : this.trigger(sr); };
			})(jQuery,'smartresize');
		</script>
        <script type="text/javascript">	
            $(function() {
				//check if the user made the
				//mistake to open it with IE
				var ie 			= false;
				if ($.browser.msie)
					ie = true;
				//flag to control the click event
				var flg_click	= true;
				//the wrapper
                var $im_wrapper	= $('#im_wrapper');
				//the thumbs
				var $thumbs		= $im_wrapper.children('div');
				//all the images
				var $thumb_imgs = $thumbs.find('img');
				//number of images
				var nmb_thumbs	= $thumbs.length;
				//image loading status
				var $im_loading	= $('#im_loading');
				//number of thumbs per line
				var per_line	= 4;
				//number of thumbs per column
				var per_col		= Math.ceil(nmb_thumbs/per_line)
				//index of the current thumb
				var current		= -1;
				//mode = grid | single
				var mode		= 'grid';
				//an array with the positions of the thumbs
				//we will use it for the navigation in single mode
				var positionsArray = [];
				for(var i = 0; i < nmb_thumbs; ++i)
					positionsArray[i]=i;
				
				
				//preload all the images
				$im_loading.show();
				var loaded		= 0;
				$thumb_imgs.each(function(){
					var $this = $(this);
					$('<img/>').load(function(){
						++loaded;
						if(loaded == nmb_thumbs*2)
							start();
					}).attr('src',$this.attr('src'));
					$('<img/>').load(function(){
						++loaded;
						if(loaded == nmb_thumbs*2)
							start();
					}).attr('src',$this.attr('src').replace('/thumbs',''));
				});
				
				//starts the animation
				function start(){
					$im_loading.hide();
					//disperse the thumbs in a grid
					disperse();
				}
				
				//disperses the thumbs in a grid based on windows dimentions
				function disperse(){
					if(!flg_click) return;
					setflag();
					mode			= 'grid';
					//center point for first thumb along the width of the window
					var spaces_w 	= $(window).width()/(per_line + 1);
					//center point for first thumb along the height of the window
					var spaces_h 	= $(window).height()/(per_col + 1);
					//let's disperse the thumbs equally on the page
					$thumbs.each(function(i){
						var $thumb 	= $(this);
						//calculate left and top for each thumb,
						//considering how many we want per line
						var left	= spaces_w*((i%per_line)+1) - $thumb.width()/2;
						var top		= spaces_h*(Math.ceil((i+1)/per_line)) - $thumb.height()/2;
						//lets give a random degree to each thumb
						var r 		= Math.floor(Math.random()*41)-20;
						/*
						now we animate the thumb to its final positions;
						we also fade in its image, animate it to 115x115,
						and remove any background image	of the thumb - this
						is not relevant for the first time we call disperse,
						but when changing from single to grid mode
						 */
						if(ie)
							var param = {
								'left'		: left + 'px',
								'top'		: top + 'px'
							};
						else
							var param = {
								'left'		: left + 'px',
								'top'		: top + 'px',
								'rotate'	: r + 'deg'
							};
						$thumb.stop()
						.animate(param,700,function(){
							if(i==nmb_thumbs-1)
								setflag();
						})
						.find('img')
						.fadeIn(700,function(){
							$thumb.css({
								'background-image'	: 'none'
							});
							$(this).animate({
								'width'		: '120px',
								'height'	: '150px',
								'marginTop'	: '5px',
								'marginLeft': '5px'
							},150);
						});
					});
				}
				
				//controls if we can click on the thumbs or not
				//if theres an animation in progress
				//we don't want the user to be able to click
				function setflag(){
					flg_click = !flg_click
				}
				
				/*
				when we click on a thumb, we want to merge them
				and show the full image that was clicked.
				we need to animate the thumbs positions in order
				to center the final image in the screen. The
				image itself is the background image that each thumb
				will have (different background positions)
				If we are currently seeing the single image,
				then we want to disperse the thumbs again,
				and with this, showing the thumbs images.
				 */
				$thumbs.bind('click',function(){
					if(!flg_click) return;
					setflag();
					
					var $this 		= $(this);
					current 		= $this.index();
					
					if(mode	== 'grid'){
						mode			= 'single';
						//the source of the full image
						var image_src	= $this.find('img').attr('src');
						
						//创建一个新的窗口来显示完整图片
						var overlay = $('<div class="im_overlay"></div>');
						var fullImg = $('<img src="' + image_src + '" />');
						var closeBtn = $('<span class="im_close">&times;</span>');
						
						overlay.append(fullImg).append(closeBtn);
						$('body').append(overlay);
						
						//淡入显示
						overlay.fadeIn(300);
						
						//绑定关闭事件
						overlay.add(fullImg).add(closeBtn).bind('click', function(){
							overlay.fadeOut(300, function(){
								overlay.remove();
							});
							mode = 'grid'; //重置模式为 grid
							setflag();
						});
						
						//设置 flag 允许操作
						setTimeout(function(){
							setflag();
						}, 300);
					}
					else{
						setflag();
						//关闭 overlay 如果存在
						$('.im_overlay').fadeOut(300, function(){
							$(this).remove();
						});
					}
				});
				
				//on windows resize call the disperse function
				$(window).smartresize(function(){
					disperse();
				});
				
				//function to shuffle an array
				Array.shuffle = function( array ){
					for(
					var j, x, i = array.length; i;
					j = parseInt(Math.random() * i),
					x = array[--i], array[i] = array[j], array[j] = x
				);
					return array;
				};
            });
        </script>
    </body>
</html>
